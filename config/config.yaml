application:
  name: PressStartAI
  version: 0.1.0
  debug: true

processing:
  device: AUTO
  output_resolution: "1080x1920"
  temp_directory: temp
  output_directory: output

video:
  target_fps: 30
  codec: libx264
  bitrate: 8M

shorts:
  minimum_duration: 50
  preferred_duration: 75
  maximum_duration: 150

layout:
  face_height_percent: 40
  gameplay_height_percent: 60
  preserve_aspect_ratio: true
  stretch_gameplay: false
  gameplay_background: blurred
  background_blur_strength: 25

ai:
  whisper_model: medium
  vision_model: qwen2.5-vl
  llm_model: gemma3